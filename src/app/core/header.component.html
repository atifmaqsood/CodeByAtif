<header class="header" [class.scrolled]="isScrolled">
    <mat-toolbar class="toolbar">
        <div class="container toolbar-content">
            <a routerLink="/" class="logo">
                <span class="logo-text gradient-text">Atif Maqsood</span>
            </a>

            <nav class="nav-links" [class.mobile-open]="mobileMenuOpen">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" mat-button
                    (click)="closeMobileMenu()">
                    Home
                </a>
                <a routerLink="/about" routerLinkActive="active" mat-button (click)="closeMobileMenu()">
                    About
                </a>
                <button mat-button [matMenuTriggerFor]="domainMenu">
                    Domains <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
                </button>
                <mat-menu #domainMenu="matMenu" class="domain-menu">
                    <a routerLink="/domains/manufacturing" mat-menu-item (click)="closeMobileMenu()">
                        <mat-icon>precision_manufacturing</mat-icon> Manufacturing
                    </a>
                    <a routerLink="/domains/healthcare" mat-menu-item (click)="closeMobileMenu()">
                        <mat-icon>medical_services</mat-icon> Healthcare
                    </a>
                    <a routerLink="/domains/fintech" mat-menu-item (click)="closeMobileMenu()">
                        <mat-icon>account_balance</mat-icon> FinTech
                    </a>
                    <a routerLink="/domains/finance" mat-menu-item (click)="closeMobileMenu()">
                        <mat-icon>monetization_on</mat-icon> Finance
                    </a>
                </mat-menu>
                <a routerLink="/projects" routerLinkActive="active" mat-button (click)="closeMobileMenu()">
                    Projects
                </a>
                <a routerLink="/experience" routerLinkActive="active" mat-button (click)="closeMobileMenu()">
                    Experience
                </a>
                <a routerLink="/contact" routerLinkActive="active" mat-button (click)="closeMobileMenu()">
                    Contact
                </a>
            </nav>

            <div class="header-actions">
                <button mat-raised-button class="download-resume-btn" (click)="downloadResume()">
                    <mat-icon>download</mat-icon>
                    <span class="btn-text">Resume</span>
                </button>
                <button mat-icon-button class="mobile-menu-btn" (click)="toggleMobileMenu()">
                    <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
                </button>
            </div>
        </div>
    </mat-toolbar>
</header>
